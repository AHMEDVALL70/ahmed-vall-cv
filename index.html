    function renderCerts(certs) {
        let html = '';
        certs.forEach(c => {

        });
        document.getElementById('certs-list').innerHTML = html;
    }

    function renderTechProjects(projs, btnTxt) {
        let html = '';
        projs.forEach((p, index) => {
            html += `
            <div class="project-card" style="border-top-color:${p.color}; transition-delay: ${index * 0.1}s">
                <h3>${p.title}</h3>
                <p>${p.desc}</p>
                <a href="${p.link}" target="_blank" style="color:${p.color};">
                    ${btnTxt}
                </a>
            </div>`;
        });
        document.getElementById('tech-portfolio-list').innerHTML = html;
        
        // تفعيل حركة الظهور بعد تحميل العناصر
        setTimeout(() => {
            document.querySelectorAll('.project-card').forEach(card => card.classList.add('visible'));
        }, 100);
    }

    function toggleTheme() {
        const body = document.documentElement;

        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    }

        btn.style.opacity = "1";

        localStorage.setItem('site_v_count', views);
        document.getElementById('v-count').innerText = views;

    // إعدادات تأثير الكتابة (Typewriter)
    let roleIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    let typeSpeed = 100;

    function typeEffect() {
        const lang = document.documentElement.lang || 'en';
        // تأكد من إضافة صف 'roles' في كائن translations لكل لغة
        const currentRoles = translations[lang].roles || ["Engineer", "Diplomat"]; 
        const currentFullText = currentRoles[roleIndex];
        const displayElement = document.getElementById('job-subtitle');

        if (isDeleting) {
            charIndex--;
            typeSpeed = 50;
        } else {
            charIndex++;
            typeSpeed = 100;
        }

        displayElement.innerHTML = currentFullText.substring(0, charIndex) + '<span class="typewriter-cursor"></span>';

        if (!isDeleting && charIndex === currentFullText.length) {
            isDeleting = true;
            typeSpeed = 2000; // مدة التوقف عند اكتمال الكلمة
        } else if (isDeleting && charIndex === 0) {
            isDeleting = false;
            roleIndex = (roleIndex + 1) % currentRoles.length;
            typeSpeed = 500;
        }

        setTimeout(typeEffect, typeSpeed);
    }

    // تشغيل التأثير عند تحميل النافذة
    window.addEventListener('load', () => {
        setTimeout(typeEffect, 1000);
    });
