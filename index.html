        renderGeneralProjects(d.projects);
        renderLangBars(lang);

        document.querySelectorAll('.lang-switcher .lang-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
    }

    function renderCerts(certs) {
        let html = '';
        certs.forEach(c => {
            html += `<div class="cert-card"><i class="fas fa-certificate cert-icon"></i><div><strong>${c.title}</strong><small>${c.provider} • ${c.date}</small></div></div>`;
        });
        document.getElementById('certs-list').innerHTML = html;
    }

    function renderTechProjects(projs, btnTxt) {
        let html = '';
        projs.forEach(p => {
            html += `<div class="project-card" style="border-left-color:${p.color}"><h3>${p.title}</h3><p>${p.desc}</p><a href="${p.link}" target="_blank" style="color:${p.color}; font-weight:bold;"><i class="fab fa-github"></i> ${btnTxt}</a></div>`;
        });
        document.getElementById('tech-portfolio-list').innerHTML = html;
    }

    function renderExperience(exp) {
        let html = '';
        exp.forEach(item => {
            html += `<div class="exp-item"><span class="exp-title">${item.title}</span><span class="exp-company">${item.company}</span><span class="exp-date">${item.date}</span><p>${item.desc}</p></div>`;
        });
        document.getElementById('experience-list').innerHTML = html;
    }

    function renderSkills(skills) {
        let html = '';
        skills.forEach(s => html += `<li>${s}</li>`);
        document.getElementById('skills-list').innerHTML = html;
    }

    function renderGeneralProjects(projs) {
        let html = '';
        projs.forEach(p => html += `<div class="info-card"><h3>${p.title}</h3><p>${p.desc}</p></div>`);
        document.getElementById('projects-list').innerHTML = html;
    }

    function renderLangBars(lang) {
        const labels = lang === 'ar' ? ['العربية', 'الفرنسية', 'الإنجليزية'] : (lang === 'fr' ? ['Arabe', 'Français', 'Anglais'] : ['Arabic', 'French', 'English']);
        document.getElementById('lang-levels').innerHTML = `
            <div style="margin-bottom:12px">${labels[0]} 100% <div class="progress-bar"><div class="progress" style="width:100%"></div></div></div>
            <div style="margin-bottom:12px">${labels[1]} 70% <div class="progress-bar"><div class="progress" style="width:70%"></div></div></div>
            <div>${labels[2]} 50% <div class="progress-bar"><div class="progress" style="width:50%"></div></div></div>`;
    }

    function toggleTheme() {
        const body = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    }

    function playMedia(url, btn) {
        const player = document.getElementById('smartPlayer');
        player.src = url; 
        player.play().catch(e => console.log("Audio play prevented or error: ", e));
        document.querySelectorAll('.surah-btns .lang-btn').forEach(b => b.style.opacity = "0.6");
        btn.style.opacity = "1";
    }

    window.onload = () => {
        setLanguage('en'); 
        let views = localStorage.getItem('site_v_count') || 500;
        views = parseInt(views) + 1;
        localStorage.setItem('site_v_count', views);
        document.getElementById('v-count').innerText = views;
    };
</script>
</body>
</html>
